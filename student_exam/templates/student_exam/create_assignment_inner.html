<section class="content">
    <div class="container-fluid">
   
<form method="POST" action={% url 'create-assignment' %} enctype="multipart/form-data">
    {% csrf_token %}
  
    <div class="row">
      <div class="col-sm-12">
        {% for field in assignment %}
        <div class="form-group row">
          <label class="col-sm-2 col-form-label" for="{{ field.auto_id }}">
            {{ field.label }}
            {% for error in field.errors %}
            <small id="{{ field.auto_id }}" class="text-danger">{{ error }}</small>
            {% endfor %}
          </label>
          <div class="col-sm-10">
            {{ field | add_class:"form-control"}}
            {% if field.help_text %}
            <small>{{ field.help_text|safe }}</small>
            {% endif %}
          </div>
        </div>
        {% endfor %}
        <button class="btn btn-secondary" type="submit" name="create-assignment">Create assignment
            <!-- <i class="fa float-sm-right "></i> -->
        </button>
      </div>
      
    </form>
    </div>
</section>
