{% load i18n %}

<div class="modal fade" id="genericModel" tabindex="-1" role="dialog" aria-labelledby="genericModelTitle" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h4 class="modal-title" id="genericModelTitle">
                    <i class="fas fa-edit mr-2"></i>{{title}}
                </h4>
                <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span>
                  <span class="sr-only">&times;</span>
                </button>
            </div>

            <div class="modal-body"></div>
        </div>
    </div>
</div>
