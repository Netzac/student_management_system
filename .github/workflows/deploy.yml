name: CI/CD Deploy to PythonAnywhere

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.PA_SSH_PRIVATE_KEY }}
          known_hosts: 'placeholder_will_be_ignored'
          if_key_exists: replace

      - name: Execute Remote SSH Deploy Commands
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ${{ secrets.PA_USERNAME }}@ssh.pythonanywhere.com << 'EOF'
            set -e
            echo "--- Navigating to Project Root ---"
            cd ~/student_management_system
            
            echo "--- Pulling latest code from GitHub ---"
            git pull origin main
            
            echo "--- Activating Virtual Environment ---"
            source ~/.virtualenvs/myenv/bin/activate
            
            echo "--- Running Migrations ---"
            python manage.py migrate
            
            echo "--- Collecting Static Assets ---"
            python manage.py collectstatic --noinput
            
            echo "--- Reloading Web App Server ---"
            touch /var/www/${{ secrets.PA_USERNAME }}_pythonanywhere_com_wsgi.py
            
            echo "--- Deployment Finished Successfully! ---"
          EOF
