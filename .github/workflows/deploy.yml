name: CI/CD Deploy to PythonAnywhere

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.PA_SSH_PRIVATE_KEY }}
          known_hosts: 'placeholder_will_be_ignored'
          if_key_exists: replace

      - name: Execute Remote SSH Deploy Commands
        run: |
          ssh -v -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ${{ secrets.PA_USERNAME }}@://pythonanywhere.com "
            cd ~/student_management_system &&
            git pull origin main &&
            source ~/.virtualenvs/myenv/bin/activate &&
            python manage.py migrate &&
            python manage.py collectstatic --noinput &&
            touch /var/www/${{ secrets.PA_USERNAME }}_pythonanywhere_com_wsgi.py
          "
