<section class="content">
   
    <div class="row justify-content-center">
      <div class="col-md-2 mt-3">
        <div class="">
            <div class="card">
            <img src={{logo}} class="img-fluid" >
           </div>
        </div>
     </div>
    <div class="col-md-10">
        <div class="card-body">
            <table class="table table-sm table-responsive ">
              <thead class="thead-white">
                <tr>
                    <th class="text-center" colspan="2">
                        <h1>{{SchoolName}} </h1>
                    </th>
                </tr>
              </thead>
              <tbody>
                <tr>
                    <td colspan="2"><h4 class="text-center">{{SchoolAddress}}</h4></td>
                </tr>
                <tr>
                    <td>Phone: {{SchoolPhone}}</td>
                    <td>Email: {{SchoolEmail}}</td>
                </tr>
                <tr>
                    <td colspan="2"> Branch: {{SchoolBranch}}</td>
                </tr>
              </tbody>
            <tfoot>
              <tr>
                <td colspan="2"><h4 class="text-center">End of Term Report</h4></td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>
      </div>
     
  </section>
